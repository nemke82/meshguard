<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MeshGuard</title>
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <!-- Screen: Splash / Connect -->
      <div id="screen-connect" class="screen active">
        <div class="connect-container">
          <div class="logo">
            <div class="logo-icon">
              <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="2" opacity="0.3"/>
                <circle cx="32" cy="12" r="4" fill="currentColor"/>
                <circle cx="12" cy="42" r="4" fill="currentColor"/>
                <circle cx="52" cy="42" r="4" fill="currentColor"/>
                <line x1="32" y1="12" x2="12" y2="42" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
                <line x1="32" y1="12" x2="52" y2="42" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
                <line x1="12" y1="42" x2="52" y2="42" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
                <circle cx="32" cy="32" r="6" fill="currentColor" opacity="0.8"/>
              </svg>
            </div>
            <h1>MeshGuard</h1>
            <p class="tagline">Encrypted Mesh Communication</p>
          </div>

          <div class="device-section">
            <button id="btn-scan" class="btn btn-primary btn-glow">
              <span class="btn-icon">&#x1F50D;</span>
              Scan for Devices
            </button>
            <div id="device-list" class="device-list"></div>
            <div id="scan-status" class="status-text"></div>
          </div>
        </div>
      </div>

      <!-- Screen: Chat -->
      <div id="screen-chat" class="screen">
        <header class="chat-header">
          <button id="btn-back" class="btn-icon-only" title="Disconnect">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
          </button>
          <div class="peer-info">
            <div class="peer-name" id="peer-name">Peer Device</div>
            <div class="peer-status" id="peer-status">
              <span class="status-dot"></span>
              <span>Encrypted &bull; P2P</span>
            </div>
          </div>
          <div class="header-actions">
            <div class="signal-indicator" id="signal-indicator" title="Signal strength">
              <div class="signal-bar bar-1"></div>
              <div class="signal-bar bar-2"></div>
              <div class="signal-bar bar-3"></div>
              <div class="signal-bar bar-4"></div>
            </div>
          </div>
        </header>

        <div class="encryption-banner" id="encryption-banner">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1s3.1 1.39 3.1 3.1v2z"/>
          </svg>
          <span>End-to-end encrypted with AES-256-GCM + X25519</span>
        </div>

        <div class="messages-container" id="messages">
          <!-- Messages will be inserted here -->
        </div>

        <div class="input-area">
          <div class="input-wrapper">
            <textarea
              id="message-input"
              placeholder="Type a secure message..."
              rows="1"
              maxlength="228"
            ></textarea>
            <span class="char-count" id="char-count">228</span>
          </div>
          <button id="btn-send" class="btn-send" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
