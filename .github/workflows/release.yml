name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ──────────────────────────────────────────────
  # Android APK
  # ──────────────────────────────────────────────
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          # Semver for Cargo/Tauri (strip leading zeros): v2026.03.25 → 2026.3.25
          RAW=${GITHUB_REF_NAME#v}
          MAJOR=$(echo "$RAW" | cut -d. -f1)
          MINOR=$(echo "$RAW" | cut -d. -f2 | sed 's/^0*//' | sed 's/^$/0/')
          PATCH=$(echo "$RAW" | cut -d. -f3 | sed 's/^0*//' | sed 's/^$/0/')
          SEMVER="${MAJOR}.${MINOR}.${PATCH}"
          echo "Setting semver to $SEMVER"
          sed -i "s/\"version\": \".*\"/\"version\": \"$SEMVER\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \".*\"/version = \"$SEMVER\"/" src-tauri/Cargo.toml

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: sdkmanager "ndk;27.0.12077973"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: ui
        run: npm install

      - name: Build frontend
        working-directory: ui
        run: npm run build

      - name: Generate signing keystore
        run: |
          # If repo has a KEYSTORE secret, decode it; otherwise generate a fresh one for CI
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/meshguard.jks
          else
            keytool -genkeypair \
              -keystore /tmp/meshguard.jks \
              -alias meshguard \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass meshguard \
              -keypass meshguard \
              -dname "CN=MeshGuard, O=MeshGuard, L=Unknown, ST=Unknown, C=US"
          fi

      - name: Initialize Android project
        run: cargo tauri android init

      - name: Patch Android project with BLE permissions
        run: bash scripts/patch-android.sh

      - name: Build Android APK (release)
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: cargo tauri android build --apk

      - name: Sign APK
        id: apk
        run: |
          # File name: YYYYMMDD format (no dots)
          RAW=${GITHUB_REF_NAME#v}
          FILEVER=$(echo "$RAW" | tr -d '.')

          # Find the unsigned APK
          UNSIGNED=$(find src-tauri/gen/android -name "*-unsigned.apk" -type f | head -1)
          if [ -z "$UNSIGNED" ]; then
            UNSIGNED=$(find src-tauri/gen/android -name "*.apk" -type f | head -1)
          fi

          KEYSTORE_PASS="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          KEY_PASS="${{ secrets.ANDROID_KEY_PASSWORD }}"
          KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}"

          # Fall back to defaults if secrets aren't set
          KEYSTORE_PASS="${KEYSTORE_PASS:-meshguard}"
          KEY_PASS="${KEY_PASS:-meshguard}"
          KEY_ALIAS="${KEY_ALIAS:-meshguard}"

          # Align the APK (required before signing)
          ALIGNED="/tmp/meshguard-aligned.apk"
          "${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/zipalign" \
            -v -p 4 "$UNSIGNED" "$ALIGNED"

          # Sign with apksigner
          DEST="meshguard-${FILEVER}-android.apk"
          "${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/apksigner" sign \
            --ks /tmp/meshguard.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:${KEYSTORE_PASS}" \
            --key-pass "pass:${KEY_PASS}" \
            --out "$DEST" \
            "$ALIGNED"

          # Verify
          "${ANDROID_HOME}/build-tools/$(ls ${ANDROID_HOME}/build-tools/ | tail -1)/apksigner" verify "$DEST"

          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          echo "name=$DEST" >> "$GITHUB_OUTPUT"

          # Clean up keystore
          rm -f /tmp/meshguard.jks /tmp/meshguard-aligned.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ steps.apk.outputs.path }}

  # ──────────────────────────────────────────────
  # Linux — Ubuntu (.deb + .AppImage)
  # ──────────────────────────────────────────────
  build-linux-ubuntu:
    name: Linux (Ubuntu — deb/AppImage)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          RAW=${GITHUB_REF_NAME#v}
          MAJOR=$(echo "$RAW" | cut -d. -f1)
          MINOR=$(echo "$RAW" | cut -d. -f2 | sed 's/^0*//' | sed 's/^$/0/')
          PATCH=$(echo "$RAW" | cut -d. -f3 | sed 's/^0*//' | sed 's/^$/0/')
          SEMVER="${MAJOR}.${MINOR}.${PATCH}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$SEMVER\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \".*\"/version = \"$SEMVER\"/" src-tauri/Cargo.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libdbus-1-dev \
            pkg-config \
            libssl-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps & build
        working-directory: ui
        run: |
          npm install
          npm run build

      - name: Build Tauri (deb + AppImage)
        run: cargo tauri build

      - name: Collect artifacts
        id: artifacts
        run: |
          FILEVER=$(echo "${GITHUB_REF_NAME#v}" | tr -d '.')
          mkdir -p release-artifacts

          # .deb
          DEB=$(find src-tauri/target/release/bundle/deb -name "*.deb" | head -1)
          if [ -n "$DEB" ]; then
            cp "$DEB" "release-artifacts/meshguard-${FILEVER}-amd64.deb"
          fi

          # .AppImage
          AI=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
          if [ -n "$AI" ]; then
            cp "$AI" "release-artifacts/meshguard-${FILEVER}-x86_64.AppImage"
            chmod +x "release-artifacts/meshguard-${FILEVER}-x86_64.AppImage"
          fi

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-ubuntu
          path: release-artifacts/

  # ──────────────────────────────────────────────
  # Linux — RHEL/Fedora (.rpm)
  # ──────────────────────────────────────────────
  build-linux-rpm:
    name: Linux (RHEL/Fedora — RPM)
    runs-on: ubuntu-22.04
    container:
      image: fedora:39
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          RAW=${GITHUB_REF_NAME#v}
          MAJOR=$(echo "$RAW" | cut -d. -f1)
          MINOR=$(echo "$RAW" | cut -d. -f2 | sed 's/^0*//' | sed 's/^$/0/')
          PATCH=$(echo "$RAW" | cut -d. -f3 | sed 's/^0*//' | sed 's/^$/0/')
          SEMVER="${MAJOR}.${MINOR}.${PATCH}"
          sed -i "s/\"version\": \".*\"/\"version\": \"$SEMVER\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \".*\"/version = \"$SEMVER\"/" src-tauri/Cargo.toml

      - name: Install system dependencies
        run: |
          dnf install -y \
            gcc gcc-c++ make \
            webkit2gtk4.1-devel \
            libappindicator-gtk3-devel \
            librsvg2-devel \
            patchelf \
            dbus-devel \
            openssl-devel \
            pkg-config \
            curl \
            rpm-build \
            nodejs npm \
            git

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install Tauri CLI
        run: |
          source "$HOME/.cargo/env"
          cargo install tauri-cli --version "^2"

      - name: Install frontend deps & build
        working-directory: ui
        run: |
          npm install
          npm run build

      - name: Build Tauri (RPM)
        run: |
          source "$HOME/.cargo/env"
          cargo tauri build --bundles rpm

      - name: Collect RPM
        id: rpm
        run: |
          FILEVER=$(echo "${GITHUB_REF_NAME#v}" | tr -d '.')
          mkdir -p release-artifacts
          RPM=$(find src-tauri/target/release/bundle/rpm -name "*.rpm" | head -1)
          if [ -n "$RPM" ]; then
            cp "$RPM" "release-artifacts/meshguard-${FILEVER}.x86_64.rpm"
          fi

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-rpm
          path: release-artifacts/

  # ──────────────────────────────────────────────
  # macOS (.dmg + .app)
  # ──────────────────────────────────────────────
  build-macos:
    name: macOS (dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        run: |
          RAW=${GITHUB_REF_NAME#v}
          MAJOR=$(echo "$RAW" | cut -d. -f1)
          MINOR=$(echo "$RAW" | cut -d. -f2 | sed 's/^0*//' | sed 's/^$/0/')
          PATCH=$(echo "$RAW" | cut -d. -f3 | sed 's/^0*//' | sed 's/^$/0/')
          SEMVER="${MAJOR}.${MINOR}.${PATCH}"
          echo "Setting semver to $SEMVER"
          sed -i '' "s/\"version\": \".*\"/\"version\": \"$SEMVER\"/" src-tauri/tauri.conf.json
          sed -i '' "s/^version = \".*\"/version = \"$SEMVER\"/" src-tauri/Cargo.toml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps & build
        working-directory: ui
        run: |
          npm install
          npm run build

      - name: Build Tauri (macOS universal)
        run: cargo tauri build --target universal-apple-darwin

      - name: Collect artifacts
        id: artifacts
        run: |
          FILEVER=$(echo "${GITHUB_REF_NAME#v}" | tr -d '.')
          mkdir -p release-artifacts
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" "release-artifacts/meshguard-${FILEVER}-universal-macos.dmg"
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release-artifacts/

  # ──────────────────────────────────────────────
  # Create GitHub Release
  # ──────────────────────────────────────────────
  publish-release:
    name: Publish Release
    needs: [build-android, build-linux-ubuntu, build-linux-rpm, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
          body: |
            ## MeshGuard ${{ github.ref_name }}

            Secure peer-to-peer encrypted messenger for Meshtastic devices.

            ### Downloads

            | Platform | File |
            |----------|------|
            | Android | `meshguard-*-android.apk` |
            | Ubuntu/Debian | `meshguard-*-amd64.deb` |
            | RHEL/Fedora | `meshguard-*.x86_64.rpm` |
            | Linux (universal) | `meshguard-*-x86_64.AppImage` |
            | macOS (universal) | `meshguard-*-universal-macos.dmg` |

            ### Verify integrity
            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
